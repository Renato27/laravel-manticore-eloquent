name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
        laravel: ['10.*', '11.*', '12.*']
        exclude:
          - php: '8.1'
            laravel: '11.*'
          - php: '8.1'
            laravel: '12.*'
    name: Unit · PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql, mbstring
          coverage: none
      - name: Constrain Laravel version
        run: composer require "laravel/framework:${{ matrix.laravel }}" --no-update --no-interaction
      - run: composer update --prefer-dist --no-interaction --no-progress
      - run: vendor/bin/pest --testsuite=Unit,Feature

  integration:
    runs-on: ubuntu-latest
    name: Integration · live Manticore
    services:
      manticore:
        image: manticoresearch/manticore
        ports:
          - 9306:9306
          - 9308:9308
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring
          coverage: none
      - run: composer update --prefer-dist --no-interaction --no-progress
      - name: Wait for Manticore
        run: |
          for i in $(seq 1 30); do
            if mysql -h127.0.0.1 -P9306 -e 'SHOW TABLES;' 2>/dev/null; then break; fi
            sleep 2
          done
      - run: vendor/bin/pest --testsuite=Integration
        env:
          MANTICORE_HOST: 127.0.0.1
          MANTICORE_PORT: 9306
